<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .label {
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h3>Rekolto Relay</h3>
  <div class="status">
    <span id="dot" class="dot disconnected"></span>
    <span id="label" class="label">Disconnected</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
